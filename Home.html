<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Home - Lumière Hotel</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<h1>Welcome to Lumière Hotel</h1>

<h2>Accommodations</h2>
<div class="carousel">
  <div class="carousel-item"><img src="https://via.placeholder.com/250x150?text=Standard+Room" alt="Room 1"><p>Standard ⭐⭐⭐</p></div>
  <div class="carousel-item"><img src="https://via.placeholder.com/250x150?text=Deluxe+Room" alt="Room 2"><p>Deluxe ⭐⭐⭐⭐</p></div>
  <div class="carousel-item"><img src="https://via.placeholder.com/250x150?text=Suite" alt="Room 3"><p>Suite ⭐⭐⭐⭐⭐</p></div>
</div>

<h2>Foods & Beverages</h2>
<div class="carousel">
  <div class="carousel-item"><img src="https://via.placeholder.com/250x150?text=Burger" alt="Burger"><p>Burger ⭐⭐⭐⭐</p></div>
  <div class="carousel-item"><img src="https://via.placeholder.com/250x150?text=Pizza" alt="Pizza"><p>Pizza ⭐⭐⭐⭐</p></div>
  <div class="carousel-item"><img src="https://via.placeholder.com/250x150?text=Coffee" alt="Coffee"><p>Coffee ⭐⭐⭐</p></div>
</div>

<div class="payment">
<h2>Choose Payment Method</h2>
<button onclick="pay('Online Card')">Online Card</button>
<button onclick="pay('Manual Payment')">Manual Payment</button>
</div>

<footer>
<h3>Contact Us</h3>
<p>Email: info@lumierehotel.com</p>
<p>Phone: +63 912 345 6789</p>
</footer>

<script>
function pay(method){
  alert(`You chose ${method}. Thank you for booking!`);
}
</script>
</body>
</html>
